name: wolf_lab
description: "Wolf Lab - Personal Study Companion."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  flutter_riverpod: ^3.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  file_picker: ^10.3.2
  syncfusion_flutter_pdf: ^30.2.7
  purchases_flutter: ^9.13.1
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  mobile_scanner: ^7.0.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/branding/wolf_lab_logo_1024.png"
  adaptive_icon_background: "#0F1115"
  adaptive_icon_foreground: "assets/branding/wolf_lab_logo_1024.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/decks/
